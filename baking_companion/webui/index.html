<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Baking Companion</title>
  <link rel="stylesheet" href="/static/ds.css">
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <div class="app">
    <div id="screenArea" class="screenArea"></div>

    <nav class="tabbar" id="tabbar">
      <button data-tab="current">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"></path><path d="M5 9.5V21h14V9.5"></path></svg>
        <span>Current</span>
      </button>
      <button data-tab="bakes">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="17" rx="1"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="16" y1="2" x2="16" y2="6"></line></svg>
        <span>Bakes</span>
      </button>
      <button data-tab="recipes">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5a2 2 0 0 1 2-2h6v18H6a2 2 0 0 1-2-2z"></path><path d="M20 5a2 2 0 0 0-2-2h-6v18h6a2 2 0 0 0 2-2z"></path></svg>
        <span>Recipes</span>
      </button>
    </nav>

    <div id="toast" class="toast" hidden></div>

    <!-- camera panel -->
    <div id="camera" class="camera" hidden>
      <div class="stage">
        <video id="video" autoplay playsinline muted></video>
        <span id="recIndicator" class="rec" hidden><span class="dot"></span>REC</span>
        <span id="camTarget" class="target"></span>
        <span id="camStatus" class="status"></span>
        <canvas id="canvas" hidden></canvas>
      </div>
      <div class="bar">
        <button class="btn btn-icon" id="camClose" title="Close">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="6" y1="6" x2="18" y2="18"></line><line x1="18" y1="6" x2="6" y2="18"></line></svg>
        </button>
        <button class="shutter" id="camSnap" title="Photo"></button>
        <button class="btn btn-icon" id="camRecord" title="Record">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="6" width="14" height="12" rx="2"></rect><path d="M16 10 22 6v12l-6-4z"></path></svg>
        </button>
      </div>
    </div>

    <!-- lightbox -->
    <div id="lightbox" class="lightbox" hidden><div class="frame" id="lightboxFrame"></div></div>

    <!-- finish & share dialog -->
    <div id="finishDialog" class="dialog-backdrop" hidden>
      <div class="dialog">
        <span class="dialog-title">Bake finished</span>
        <div class="dialog-body">
          <div style="background:var(--color-neutral-200);aspect-ratio:16/10;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;margin-bottom:10px">
            <h4 id="finishName" style="margin:0"></h4>
            <p style="margin:0;font-size:12px;opacity:.6">Timelapse + result card preview</p>
          </div>
          A shareable card with your timelapse and final result photo.
        </div>
        <div class="dialog-actions">
          <button class="btn btn-secondary" id="finishClose">Close</button>
          <button class="btn btn-primary" id="finishShare">Download</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
