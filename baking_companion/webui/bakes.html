<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bakes</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <h1>Bakes</h1>
    <div><a href="/" class="navlink">▶ Current</a> &nbsp; <a href="/recipes" class="navlink">📚 Recipes</a></div>
  </header>

  <section id="view-list" class="view">
    <button id="newBtn">＋ Start a new bake</button>
    <ol id="bakeList" class="steps"></ol>
  </section>

  <section id="view-new" class="view" hidden>
    <h2>Start a new bake</h2>
    <label>Recipe
      <select id="recipeSel"></select>
    </label>
    <label>Name (optional)
      <input id="bakeName" placeholder="e.g. Sunday loaf">
    </label>
    <div class="controls">
      <button id="startBtn">Start &amp; open</button>
      <button id="newCancel" class="cam">Cancel</button>
    </div>
    <div id="newStatus" class="heard"></div>
  </section>

  <script src="/static/bakes.js"></script>
</body>
</html>
