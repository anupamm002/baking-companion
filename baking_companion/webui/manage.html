<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Recipe Library</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <h1>Recipe library</h1>
    <a href="/" class="navlink">← Bake</a>
  </header>

  <!-- LIBRARY -->
  <section id="view-library" class="view">
    <button id="addBtn">＋ Add recipe</button>
    <ol id="recipeList" class="steps"></ol>
  </section>

  <!-- ADD -->
  <section id="view-add" class="view" hidden>
    <h2>Add a recipe</h2>
    <p class="muted">Give any combination — a URL, pasted/typed text, and photos. They all
      go to the AI together to build one structured recipe.</p>
    <label>Recipe URL
      <input id="inUrl" type="url" placeholder="https://...">
    </label>
    <label>Paste or describe the recipe
      <textarea id="inText" rows="6" placeholder="Flour 500g, water 375g..."></textarea>
    </label>
    <label>Photos of the recipe (optional)
      <input id="inImages" type="file" accept="image/*" multiple>
    </label>
    <div class="controls">
      <button id="genBtn">✨ Generate with AI</button>
      <button id="addCancel" class="cam">Cancel</button>
    </div>
    <div id="addStatus" class="heard"></div>
  </section>

  <!-- REVIEW / EDIT -->
  <section id="view-review" class="view" hidden>
    <h2>Review &amp; edit</h2>
    <div id="reviewSummary" class="assistant"></div>
    <textarea id="yamlEditor" rows="18" spellcheck="false"></textarea>
    <label>AI-assisted edit
      <div class="controls">
        <input id="aiInstr" placeholder="e.g. raise hydration to 80%, add a 20 min autolyse">
        <button id="aiEditBtn">Apply</button>
      </div>
    </label>
    <div class="controls">
      <button id="saveBtn">Save to library</button>
      <button id="reviewCancel" class="cam">Cancel</button>
    </div>
    <div id="reviewStatus" class="heard"></div>
  </section>

  <script src="/static/manage.js"></script>
</body>
</html>
